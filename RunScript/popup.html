<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RunScript</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    .popup-container {
      padding: 15px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .options-btn {
      padding: 6px 12px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .options-btn:hover {
      background: #106ebe;
    }

    #script-list {
      list-style: none;
    }

    .script-item {
      padding: 10px;
      background: white;
      margin-bottom: 8px;
      border-radius: 4px;
      border: 1px solid #e0e0e0;
      cursor: pointer;
      transition: background-color 0.2s, border-color 0.2s;
    }

    .script-item:hover {
      background-color: #f0f0f0;
      border-color: #0078d4;
    }

    .script-item.manual {
      display: block;
    }

    .script-item.disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .script-name {
      font-weight: 500;
      margin-bottom: 4px;
      color: #0078d4;
    }

    .script-info {
      font-size: 12px;
      color: #666;
    }

    .empty-state {
      padding: 20px;
      text-align: center;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <h1>RunScript</h1>
      <button class="options-btn">Settings</button>
    </div>
    <ul id="script-list"></ul>
    <div id="empty-state" class="empty-state">
      No scripts available for manual execution
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
